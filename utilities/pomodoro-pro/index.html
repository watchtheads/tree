<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Celestrium Online | Pomodoro Pro</title>
  <link rel="icon" type="image/x-icon" href="favicon.png?login.live.com">
  <style>
    /* --- Minimalist Light Theme --- */
    :root {
      --bg: #fafafa;
      --surface: #ffffff;
      --text-main: #111111;
      --text-muted: #888888;
      --border: #eaeaea;
      --accent: #000000;
      --danger: #ef4444;
      --success: #22c55e;
      --ring-bg: #f0f0f0;
      --radius: 12px;
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* --- Header & Nav --- */
    header {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 24px;
    }
    
    .nav-actions {
      display: flex;
      gap: 12px;
    }

    button {
      background: none;
      border: none;
      font-family: inherit;
      color: var(--text-main);
      cursor: pointer;
      outline: none;
    }

    .icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--surface);
      border: 1px solid var(--border);
      transition: all 0.2s ease;
    }
    .icon-btn:hover { background: var(--border); }
    .icon-btn svg { width: 18px; height: 18px; fill: currentColor; }

    /* --- Main Timer Area --- */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 500px;
      padding: 20px;
    }

    .timer-container {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin-bottom: 40px;
    }

    .progress-ring {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      transform: rotate(-90deg);
    }
    .progress-ring circle {
      fill: transparent;
      stroke-width: 4;
    }
    .progress-ring .track { stroke: var(--ring-bg); }
    .progress-ring .progress {
      stroke: var(--accent);
      stroke-linecap: round;
      transition: stroke-dashoffset 0.1s linear;
    }

    .time-display {
      font-size: 5rem;
      font-weight: 300;
      letter-spacing: -2px;
      font-variant-numeric: tabular-nums;
      z-index: 1;
    }

    .timer-label {
      font-size: 0.9rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-top: 4px;
      font-weight: 500;
    }

    .timer-controls {
      display: flex;
      gap: 16px;
      margin-bottom: 40px;
    }

    .btn-main {
      padding: 14px 32px;
      border-radius: 30px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 500;
      transition: transform 0.1s, opacity 0.2s;
    }
    .btn-main:active { transform: scale(0.96); }
    .btn-secondary {
      padding: 14px 24px;
      border-radius: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      font-size: 1rem;
      font-weight: 500;
    }
    .btn-secondary:hover { background: var(--bg); }

    /* --- Current Task --- */
    .current-task-widget {
      width: 100%;
      text-align: center;
      padding: 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }
    .current-task-widget input {
      width: 100%;
      border: none;
      text-align: center;
      font-size: 1.1rem;
      outline: none;
      background: transparent;
      color: var(--text-main);
    }
    .current-task-widget input::placeholder { color: var(--text-muted); }

    /* --- Modals (Dialogs) --- */
    dialog {
      margin: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.3s ease;
    }
    dialog[open] {
      opacity: 1;
      transform: translateY(0);
    }
    dialog::backdrop {
      background: rgba(250, 250, 250, 0.8);
      backdrop-filter: blur(4px);
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h2 { font-size: 1.2rem; font-weight: 600; }
    .close-btn { font-size: 1.5rem; color: var(--text-muted); }

    /* Forms inside Modals */
    .form-group {
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .form-group label { font-size: 0.9rem; color: var(--text-muted); }
    .form-group input[type="number"] {
      width: 60px;
      padding: 8px;
      border: 1px solid var(--border);
      border-radius: 6px;
      text-align: center;
    }

    /* Task List */
    .task-list { list-style: none; max-height: 250px; overflow-y: auto; }
    .task-item {
      display: flex;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .task-item:last-child { border-bottom: none; }
    .task-item.completed span { text-decoration: line-through; color: var(--text-muted); }
    .task-item span { flex: 1; font-size: 0.95rem; }
    .task-check { width: 20px; height: 20px; cursor: pointer; accent-color: var(--accent); }
    .task-delete { color: var(--danger); font-size: 0.8rem; padding: 4px; }

    /* Stats Grid */
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .stat-box {
      background: var(--bg);
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      border: 1px solid var(--border);
    }
    .stat-val { font-size: 1.8rem; font-weight: 600; margin-bottom: 4px; }
    .stat-lbl { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; }

    .keyboard-hints {
      margin-top: auto;
      padding: 20px;
      font-size: 0.8rem;
      color: var(--text-muted);
      text-align: center;
    }
  </style>
</head>
<body>

  <header>
    <div style="font-weight: 600; letter-spacing: -0.5px;">Pomodoro</div>
    <div class="nav-actions">
      <button class="icon-btn" onclick="openModal('tasksModal')" title="Tasks">
        <svg viewBox="0 0 24 24"><path d="M9 16.2L4.8 12l-1.4 1.4L9 19 21 7l-1.4-1.4L9 16.2z"/></svg>
      </button>
      <button class="icon-btn" onclick="openModal('statsModal')" title="Statistics">
        <svg viewBox="0 0 24 24"><path d="M3 3v18h18v-2H5V3H3zm14 14V7h2v10h-2zm-4 0v-6h2v6h-2zm-4 0V9h2v8H9z"/></svg>
      </button>
      <button class="icon-btn" onclick="openModal('settingsModal')" title="Settings">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>
      </button>
    </div>
  </header>

  <main>
    <div class="timer-container">
      <svg class="progress-ring" viewBox="0 0 120 120">
        <circle class="track" cx="60" cy="60" r="56"></circle>
        <circle class="progress" cx="60" cy="60" r="56" id="timerRing"></circle>
      </svg>
      <div class="time-display" id="timeDisplay">25:00</div>
      <div class="timer-label" id="modeLabel">Focus • #1</div>
    </div>

    <div class="timer-controls">
      <button class="btn-secondary" id="btnReset">Reset</button>
      <button class="btn-main" id="btnToggle">Start</button>
      <button class="btn-secondary" id="btnSkip">Skip</button>
    </div>

    <div class="current-task-widget">
      <input type="text" id="mainTaskInput" placeholder="What are you focusing on?" autocomplete="off" />
    </div>
  </main>

  <div class="keyboard-hints">
    [Space] Start/Pause &nbsp;•&nbsp; [S] Skip &nbsp;•&nbsp; [R] Reset
  </div>

  <!-- Settings Modal -->
  <dialog id="settingsModal">
    <div class="modal-header">
      <h2>Settings</h2>
      <button class="close-btn" onclick="closeModal('settingsModal')">&times;</button>
    </div>
    <div class="form-group">
      <label>Focus (minutes)</label>
      <input type="number" id="setFocus" min="1" max="90">
    </div>
    <div class="form-group">
      <label>Short Break (minutes)</label>
      <input type="number" id="setShort" min="1" max="30">
    </div>
    <div class="form-group">
      <label>Long Break (minutes)</label>
      <input type="number" id="setLong" min="1" max="60">
    </div>
    <div class="form-group" style="justify-content: flex-start; gap: 10px; margin-top: 24px;">
      <input type="checkbox" id="setSound" style="accent-color: var(--accent);">
      <label for="setSound">Play sound alerts</label>
    </div>
    <button class="btn-main" style="width: 100%; margin-top: 10px;" onclick="saveSettings()">Save & Apply</button>
  </dialog>

  <!-- Tasks Modal -->
  <dialog id="tasksModal">
    <div class="modal-header">
      <h2>Tasks</h2>
      <button class="close-btn" onclick="closeModal('tasksModal')">&times;</button>
    </div>
    <ul class="task-list" id="taskList"></ul>
  </dialog>

  <!-- Stats Modal -->
  <dialog id="statsModal">
    <div class="modal-header">
      <h2>Statistics</h2>
      <button class="close-btn" onclick="closeModal('statsModal')">&times;</button>
    </div>
    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-val" id="statTodaySessions">0</div>
        <div class="stat-lbl">Focus Today</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statTodayMins">0</div>
        <div class="stat-lbl">Mins Today</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statAllSessions">0</div>
        <div class="stat-lbl">Total Focus</div>
      </div>
      <div class="stat-box">
        <div class="stat-val" id="statAllTasks">0</div>
        <div class="stat-lbl">Tasks Done</div>
      </div>
    </div>
  </dialog>

  <script>
    // --- State Management ---
    const defaultState = {
      settings: { focus: 25, short: 5, long: 15, sound: true, cycleLen: 4 },
      stats: { todaySessions: 0, todayMins: 0, allSessions: 0, allTasks: 0, lastDate: '' },
      tasks: [], currentTaskStr: ''
    };

    let state = JSON.parse(localStorage.getItem('pomo_state')) || defaultState;
    
    // Ensure nested objects exist if upgrading from older version
    state.settings = { ...defaultState.settings, ...state.settings };
    state.stats = { ...defaultState.stats, ...state.stats };
    
    // Timer Variables
    let mode = 'focus'; // focus, short, long
    let cycle = 1;
    let isRunning = false;
    let totalMs = state.settings.focus * 60 * 1000;
    let remainingMs = totalMs;
    let targetTime = 0;
    let timerInterval = null;

    // DOM Elements
    const timeDisplay = document.getElementById('timeDisplay');
    const modeLabel = document.getElementById('modeLabel');
    const timerRing = document.getElementById('timerRing');
    const btnToggle = document.getElementById('btnToggle');
    const mainTaskInput = document.getElementById('mainTaskInput');
    
    // Setup Ring Math
    const ringCircumference = 2 * Math.PI * 56;
    timerRing.style.strokeDasharray = ringCircumference;
    timerRing.style.strokeDashoffset = 0;

    // --- Core Timer Logic ---
    function formatTime(ms) {
      const totalSec = Math.ceil(ms / 1000);
      const m = Math.floor(totalSec / 60).toString().padStart(2, '0');
      const s = (totalSec % 60).toString().padStart(2, '0');
      return `${m}:${s}`;
    }

    function updateUI() {
      timeDisplay.textContent = formatTime(remainingMs);
      const modeText = mode === 'focus' ? 'Focus' : mode === 'short' ? 'Short Break' : 'Long Break';
      modeLabel.textContent = `${modeText} • #${cycle}`;
      document.title = `${formatTime(remainingMs)} - ${modeText}`;
      
      const progress = 1 - (remainingMs / totalMs);
      timerRing.style.strokeDashoffset = progress * ringCircumference;
      btnToggle.textContent = isRunning ? 'Pause' : 'Start';
      mainTaskInput.value = state.currentTaskStr;
    }

    function setMode(newMode) {
      mode = newMode;
      totalMs = state.settings[mode] * 60 * 1000;
      remainingMs = totalMs;
      isRunning = false;
      clearInterval(timerInterval);
      updateUI();
    }

    function toggleTimer() {
      if (isRunning) {
        isRunning = false;
        remainingMs = targetTime - Date.now();
        clearInterval(timerInterval);
        updateUI();
      } else {
        requestNotificationPermission(); // Ask once they engage
        isRunning = true;
        targetTime = Date.now() + remainingMs;
        timerInterval = setInterval(() => {
          remainingMs = targetTime - Date.now();
          if (remainingMs <= 0) {
            remainingMs = 0;
            completeSession();
          }
          updateUI();
        }, 100); // 100ms for smooth ring animation
      }
    }

    function resetTimer() {
      isRunning = false;
      clearInterval(timerInterval);
      remainingMs = totalMs;
      updateUI();
    }

    function skipTimer() {
      isRunning = false;
      clearInterval(timerInterval);
      remainingMs = 0;
      completeSession(true); // true = skipped, don't count stats
    }

    function completeSession(skipped = false) {
      clearInterval(timerInterval);
      isRunning = false;
      
      if (!skipped && mode === 'focus') {
        checkDate();
        state.stats.todaySessions++;
        state.stats.allSessions++;
        state.stats.todayMins += state.settings.focus;
        saveData();
        populateStats();
      }

      playSound();
      sendNotification();

      if (mode === 'focus') {
        if (cycle % state.settings.cycleLen === 0) setMode('long');
        else setMode('short');
      } else {
        if (mode === 'short' || mode === 'long') cycle++;
        setMode('focus');
      }
    }

    // --- Audio & Notifications ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound() {
      if (!state.settings.sound) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = 'sine';
      osc.frequency.setValueAtTime(800, audioCtx.currentTime);
      gain.gain.setValueAtTime(0, audioCtx.currentTime);
      gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.start();
      osc.stop(audioCtx.currentTime + 0.5);
    }

    function requestNotificationPermission() {
      if ("Notification" in window && Notification.permission === "default") {
        Notification.requestPermission();
      }
    }

    function sendNotification() {
      if ("Notification" in window && Notification.permission === "granted") {
        const body = mode === 'focus' ? "Break is over, back to focus!" : "Focus complete, take a break!";
        new Notification("Pomodoro", { body, icon: "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='50' fill='%23111'/></svg>" });
      }
    }

    // --- Data & Modals ---
    function saveData() { localStorage.setItem('pomo_state', JSON.stringify(state)); }

    function getTodayStr() { return new Date().toDateString(); }
    
    function checkDate() {
      const today = getTodayStr();
      if (state.stats.lastDate !== today) {
        state.stats.todaySessions = 0;
        state.stats.todayMins = 0;
        state.stats.lastDate = today;
      }
    }

    function openModal(id) { document.getElementById(id).showModal(); }
    function closeModal(id) { document.getElementById(id).close(); }

    // --- Tasks ---
    mainTaskInput.addEventListener('change', (e) => {
      const val = e.target.value.trim();
      state.currentTaskStr = val;
      if (val && !state.tasks.find(t => t.text === val)) {
        state.tasks.unshift({ id: Date.now(), text: val, done: false });
        populateTasks();
      }
      saveData();
    });

    function populateTasks() {
      const list = document.getElementById('taskList');
      list.innerHTML = '';
      if(state.tasks.length === 0) list.innerHTML = '<li style="color:var(--text-muted); font-size: 0.9rem;">No tasks yet. Type in the main screen to add one.</li>';
      state.tasks.forEach(task => {
        const li = document.createElement('li');
        li.className = `task-item ${task.done ? 'completed' : ''}`;
        li.innerHTML = `
          <input type="checkbox" class="task-check" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id})">
          <span>${task.text}</span>
          <button class="task-delete" onclick="deleteTask(${task.id})">✕</button>
        `;
        list.appendChild(li);
      });
    }

    function toggleTask(id) {
      const task = state.tasks.find(t => t.id === id);
      if (task) {
        task.done = !task.done;
        if(task.done) {
            state.stats.allTasks++;
            if(state.currentTaskStr === task.text) {
                state.currentTaskStr = '';
                mainTaskInput.value = '';
            }
        } else {
            state.stats.allTasks = Math.max(0, state.stats.allTasks - 1);
        }
        saveData();
        populateTasks();
        populateStats();
      }
    }

    function deleteTask(id) {
      state.tasks = state.tasks.filter(t => t.id !== id);
      saveData();
      populateTasks();
    }

    // --- Stats ---
    function populateStats() {
      checkDate();
      document.getElementById('statTodaySessions').textContent = state.stats.todaySessions;
      document.getElementById('statTodayMins').textContent = state.stats.todayMins;
      document.getElementById('statAllSessions').textContent = state.stats.allSessions;
      document.getElementById('statAllTasks').textContent = state.stats.allTasks;
    }

    // --- Settings ---
    function initSettingsForm() {
      document.getElementById('setFocus').value = state.settings.focus;
      document.getElementById('setShort').value = state.settings.short;
      document.getElementById('setLong').value = state.settings.long;
      document.getElementById('setSound').checked = state.settings.sound;
    }

    function saveSettings() {
      state.settings.focus = parseInt(document.getElementById('setFocus').value) || 25;
      state.settings.short = parseInt(document.getElementById('setShort').value) || 5;
      state.settings.long = parseInt(document.getElementById('setLong').value) || 15;
      state.settings.sound = document.getElementById('setSound').checked;
      saveData();
      setMode('focus');
      closeModal('settingsModal');
    }

    // --- Event Listeners ---
    document.getElementById('btnToggle').addEventListener('click', toggleTimer);
    document.getElementById('btnReset').addEventListener('click', resetTimer);
    document.getElementById('btnSkip').addEventListener('click', skipTimer);

    // Keyboard Shortcuts (Only trigger if not typing in input)
    document.addEventListener('keydown', (e) => {
      if (document.activeElement.tagName === 'INPUT') return;
      if (e.code === 'Space') { e.preventDefault(); toggleTimer(); }
      if (e.code === 'KeyR') resetTimer();
      if (e.code === 'KeyS') skipTimer();
    });

    // Close modals when clicking outside
    document.querySelectorAll('dialog').forEach(dialog => {
      dialog.addEventListener('click', (e) => {
        const rect = dialog.getBoundingClientRect();
        if (e.clientY < rect.top || e.clientY > rect.bottom || e.clientX < rect.left || e.clientX > rect.right) {
          dialog.close();
        }
      });
    });

    // Boot
    checkDate();
    initSettingsForm();
    populateTasks();
    populateStats();
    setMode('focus');

  </script>
</body>
</html>
